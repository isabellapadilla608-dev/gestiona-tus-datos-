<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de tu Carrito</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        @media(max-width: 768px) { .cart-layout { grid-template-columns: 1fr; } }

        .items-panel { background: white; padding: 2rem; border-radius: 0.5rem; border: 1px solid var(--border-color); }
        .summary-panel { background: white; padding: 2rem; border-radius: 0.5rem; border: 1px solid var(--border-color); height: fit-content; }
        
        .cart-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 0; border-bottom: 1px solid var(--border-color);
        }
        .cart-row-left { display: flex; align-items: center; gap: 1rem; }
        .cart-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 0.25rem; }
        
        .btn-delete { background: none; border: none; color: var(--danger-color); cursor: pointer; font-weight: 700; }
        .summary-detail { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1.05rem; }
        
        .btn-checkout {
            background-color: var(--secondary-color); color: white; border: none;
            width: 100%; padding: 1rem; font-weight: bold; border-radius: 0.375rem;
            cursor: pointer; font-size: 1.05rem; margin-top: 1rem; transition: background 0.2s;
        }
        .btn-checkout:hover { background-color: #1d4ed8; }
        
        .btn-empty {
            background-color: #e2e8f0; color: var(--text-main); border: none;
            width: 100%; padding: 0.5rem; font-weight: 500; border-radius: 0.375rem;
            cursor: pointer; margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="datos.html">Datos</a></li>
                <li><a href="ofertas.html">Ofertas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html" class="active cart-link">Carrito <span class="cart-counter" id="menuCartCount">0</span></a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <h2>Detalle de Compra Seleccionada</h2>
        
        <div class="cart-layout">
            <div class="items-panel" id="itemsContainer">
                </div>

            <div class="summary-panel">
                <h3>Resumen Finanzas</h3>
                <br>
                <div class="summary-detail">
                    <span>Artículos Totales:</span>
                    <span id="labelQuantity">0</span>
                </div>
                <div class="summary-detail">
                    <span>Subtotal:</span>
                    <span id="labelSubtotal">$0 MXN</span>
                </div>
                <div class="summary-detail" style="border-top: 2px solid var(--border-color); padding-top: 1rem; font-weight: 800;">
                    <span>Total Final:</span>
                    <span id="labelTotal">$0 MXN</span>
                </div>

                <button class="btn-checkout" onclick="confirmarPedido()">Confirmar Pedido</button>
                <button class="btn-empty" onclick="limpiarTodo()">Vaciar Carrito</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gestiona tus Datos. Sistema modular e independiente.</p>
    </footer>

    <script>
        let carrito = JSON.parse(localStorage.getItem('tienda_carrito')) || [];

        function renderizarPantalla() {
            const container = document.getElementById('itemsContainer');
            const menuBadge = document.getElementById('menuCartCount');
            const labelQty = document.getElementById('labelQuantity');
            const labelSub = document.getElementById('labelSubtotal');
            const labelTot = document.getElementById('labelTotal');

            if(carrito.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-muted); padding: 2rem;">No tienes productos seleccionados en el carrito actualmente.</p>`;
                menuBadge.textContent = 0;
                labelQty.textContent = 0;
                labelSub.textContent = "$0 MXN";
                labelTot.textContent = "$0 MXN";
                return;
            }

            container.innerHTML = "";
            let sumaItems = 0;
            let sumaDinero = 0;

            carrito.forEach((prod, indice) => {
                sumaItems += prod.cantidad;
                sumaDinero += (prod.precio * prod.cantidad);

                container.innerHTML += `
                    <div class="cart-row">
                        <div class="cart-row-left">
                            <img src="${prod.img}" class="cart-thumb">
                            <div>
                                <h4 style="margin:0;">${prod.nombre}</h4>
                                <small style="color:var(--text-muted);">ID: ${prod.id} | Cantidad: ${prod.cantidad}</small>
                            </div>
                        </div>
                        <div>
                            <span style="font-weight:700; margin-right: 1rem;">$${(prod.precio * prod.cantidad).toLocaleString()} MXN</span>
                            <button class="btn-delete" onclick="removerLinea(${indice})">Eliminar</button>
                        </div>
                    </div>
                `;
            });

            menuBadge.textContent = sumaItems;
            labelQty.textContent = sumaItems;
            labelSub.textContent = `$${sumaDinero.toLocaleString()} MXN`;
            labelTot.textContent = `$${sumaDinero.toLocaleString()} MXN`;
        }

        function removerLinea(posicion) {
            carrito.splice(posicion, 1);
            localStorage.setItem('tienda_carrito', JSON.stringify(carrito));
            renderizarPantalla();
        }

        function limpiarTodo() {
            carrito = [];
            localStorage.setItem('tienda_carrito', JSON.stringify(carrito));
            renderizarPantalla();
        }

        function confirmarPedido() {
            if(carrito.length === 0) {
                alert("Tu carrito está vacío.");
                return;
            }
            alert("¡Transacción Exitosa! Los datos del pedido han sido confirmados en el sistema.");
            limpiarTodo();
        }

        renderizarPantalla();
    </script>
</body>
</html>
